<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MineMaster – כרטיסיות | Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="../shared/utils.js"></script>
<script src="js/nav.js"></script>
<script src="js/data.js"></script>

<div class="page-wrap">

  <div class="section-header">
    <span class="section-icon">🃏</span>
    <h1>כרטיסיות</h1>
    <p id="mode-desc">בחר מצב לימוד</p>
  </div>

  <!-- MODE TABS -->
  <div class="mode-tabs" id="mode-tabs">
    <button class="mode-tab active" onclick="setMode('flip',this)">🔄 הפוך</button>
    <button class="mode-tab" onclick="setMode('learn',this)">📖 למד</button>
    <button class="mode-tab" onclick="setMode('match',this)">🎯 התאם</button>
    <button class="mode-tab" onclick="setMode('tf',this)">✅ נכון/שגוי</button>
    <button class="mode-tab" onclick="setMode('write',this)">✍️ כתיבה</button>
  </div>

  <!-- LANG TOGGLE -->
  <div style="display:flex;justify-content:flex-end;margin-bottom:12px" id="lang-wrap"></div>

  <!-- ══════════════════ FLIP MODE ══════════════════ -->
  <div id="mode-flip">
    <div class="fc-stats" id="flip-stats"></div>
    <div class="progress-dots" id="flip-dots"></div>
    <div class="fc-swipe-hint">← החלק ימינה לכרטיס הבא | שמאלה לקודם →</div>
    <div class="fc-outer" id="flip-outer">
      <div class="fc-card-scene">
        <div class="flashcard" id="flip-card" onclick="flipCard()">
          <div class="fc-front">
            <div class="fc-q" id="flip-q"></div>
            <span class="flip-hint">לחץ להפוך</span>
          </div>
          <div class="fc-back">
            <div class="fc-a" id="flip-a"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button onclick="flipPrev()">→ הקודם</button>
      <span class="fc-count" id="flip-count"></span>
      <button onclick="flipNext()">הבא ←</button>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:12px">
      <button class="btn btn-secondary" onclick="markSeen()" id="btn-seen">✓ סמן כנראה</button>
      <button class="btn btn-danger" onclick="resetSeen()">🔄 אפס</button>
    </div>
    <div style="text-align:center;margin-top:12px;font-size:.72rem;color:var(--muted)">
      מקלדת: ← → לניווט | Space להפוך
    </div>
  </div>

  <!-- ══════════════════ LEARN MODE ══════════════════ -->
  <div id="mode-learn" style="display:none">
    <div class="learn-sides">
      <button class="learn-side-btn active" id="lside-q" onclick="setLearnSide('q')">שאלה</button>
      <button class="learn-side-btn" id="lside-a" onclick="setLearnSide('a')">תשובה</button>
    </div>
    <div class="progress-dots" id="learn-dots"></div>
    <div class="learn-card" id="learn-card"></div>
    <div style="display:flex;gap:10px;justify-content:center;margin-bottom:14px" id="learn-reveal-wrap">
      <button class="btn btn-secondary" id="learn-reveal" onclick="learnReveal()">👁️ הצג תשובה</button>
    </div>
    <div id="learn-answer-wrap" style="display:none">
      <div class="learn-card" id="learn-answer-card" style="border-color:var(--accent2);font-size:.85rem;color:var(--accent2)"></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px">
        <button class="btn btn-secondary" style="border-color:var(--success);color:var(--success)" onclick="learnGotIt()">✅ ידעתי</button>
        <button class="btn btn-secondary" style="border-color:var(--danger);color:var(--danger)" onclick="learnAgain()">🔁 עוד פעם</button>
      </div>
    </div>
    <div class="fc-nav">
      <button onclick="learnPrev()">→ הקודם</button>
      <span class="fc-count" id="learn-count"></span>
      <button onclick="learnNext()">הבא ←</button>
    </div>
    <div style="text-align:center;font-size:.76rem;color:var(--muted)" id="learn-stats"></div>
  </div>

  <!-- ══════════════════ MATCH MODE ══════════════════ -->
  <div id="mode-match" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div>
        <span class="fc-count" id="match-progress">0/6 זוגות</span>
      </div>
      <div style="font-family:var(--font-mono);font-size:1rem;color:var(--accent3)" id="match-timer">0:00</div>
      <button class="btn btn-secondary" style="font-size:.76rem" onclick="startMatch()">🔀 ערבב מחדש</button>
    </div>
    <div id="match-best" style="font-size:.76rem;color:var(--muted);text-align:center;margin-bottom:8px"></div>
    <div class="match-grid" id="match-grid"></div>
    <div id="match-done" style="display:none">
      <div class="card card-glass" style="text-align:center;padding:24px">
        <div style="font-size:2rem;margin-bottom:8px">🎉</div>
        <div style="font-weight:700;margin-bottom:4px">כל הזוגות הותאמו!</div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:14px" id="match-done-time"></div>
        <button class="btn btn-primary" onclick="startMatch()">🔀 סיבוב חדש</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════ TRUE/FALSE MODE ══════════════════ -->
  <div id="mode-tf" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="fc-count" id="tf-count">1 / 15</span>
      <span id="tf-score" style="font-size:.82rem;color:var(--muted)">0 נכון</span>
    </div>
    <div class="progress-bar-wrap" style="margin-bottom:14px">
      <div class="progress-bar-fill" id="tf-prog" style="width:0%"></div>
    </div>
    <div class="tf-statement" id="tf-statement"></div>
    <div class="tf-btns" id="tf-btns">
      <button class="tf-true"  id="tf-true-btn"  onclick="answerTF(true)">✅ נכון</button>
      <button class="tf-false" id="tf-false-btn" onclick="answerTF(false)">❌ שגוי</button>
    </div>
    <div class="tf-explanation" id="tf-explanation"></div>
    <div style="text-align:center" id="tf-next-wrap" style="display:none">
      <button class="btn btn-primary" id="tf-next" onclick="nextTF()" style="display:none">הבא ←</button>
    </div>
    <div id="tf-done" style="display:none">
      <div class="card card-glass" style="text-align:center;padding:24px">
        <div style="font-size:2rem;margin-bottom:8px" id="tf-done-icon"></div>
        <div style="font-weight:700;margin-bottom:4px" id="tf-done-title"></div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:14px" id="tf-done-sub"></div>
        <button class="btn btn-primary" onclick="startTF()">🔄 נסה שוב</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════ WRITE MODE ══════════════════ -->
  <div id="mode-write" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span class="fc-count" id="write-count">1 / 15</span>
      <span id="write-score" style="font-size:.82rem;color:var(--muted)">0 נכון</span>
    </div>
    <div class="progress-bar-wrap" style="margin-bottom:14px">
      <div class="progress-bar-fill" id="write-prog" style="width:0%"></div>
    </div>
    <div class="write-prompt" id="write-prompt"></div>
    <div class="write-input-row">
      <input type="text" class="write-input" id="write-input"
             placeholder="הקלד את התשובה..." autocomplete="off" autocorrect="off"
             onkeydown="if(event.key==='Enter')submitWrite()">
      <button class="btn btn-primary" onclick="submitWrite()">בדוק</button>
    </div>
    <div class="write-feedback" id="write-feedback"></div>
    <div style="text-align:center;margin-top:8px">
      <button class="btn btn-secondary" id="write-next" onclick="nextWrite()" style="display:none">הבא ←</button>
    </div>
    <div id="write-done" style="display:none">
      <div class="card card-glass" style="text-align:center;padding:24px">
        <div style="font-size:2rem;margin-bottom:8px" id="write-done-icon"></div>
        <div style="font-weight:700;margin-bottom:4px" id="write-done-title"></div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:14px" id="write-done-sub"></div>
        <button class="btn btn-primary" onclick="startWrite()">🔄 נסה שוב</button>
      </div>
    </div>
  </div>

</div><!-- /page-wrap -->

<script>
/* ================================================================
   FLASHCARDS — 5 study modes
   ================================================================ */

let currentMode = Store.get(KEYS.FC_MODE, 'flip');

/* ---- Mode switcher ---- */
const modeDescs = {
  flip:  'לחץ להפוך · החלק שמאלה/ימינה',
  learn: 'ראה שאלה, הצג תשובה, סמן אם ידעת',
  match: 'התאם מונח להגדרה',
  tf:    '15 שאלות נכון / שגוי',
  write: 'קרא הגדרה — כתוב את המונח'
};

const MODE_ORDER = ['flip','learn','match','tf','write'];

function setMode(mode, btn) {
  currentMode = mode;
  Store.set(KEYS.FC_MODE, mode);
  MODE_ORDER.forEach(m => {
    document.getElementById('mode-' + m).style.display = m === mode ? 'block' : 'none';
  });
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  // Activate the correct tab even when called without a button reference
  const activeBtn = btn || document.querySelectorAll('.mode-tab')[MODE_ORDER.indexOf(mode)];
  if (activeBtn) activeBtn.classList.add('active');
  document.getElementById('mode-desc').textContent = modeDescs[mode] || '';

  if (mode === 'flip')  initFlip();
  if (mode === 'learn') initLearn();
  if (mode === 'match') startMatch();
  if (mode === 'tf')    startTF();
  if (mode === 'write') startWrite();
}

/* ---- Lang toggle ---- */
function onLangChange() {
  // Re-render only the translatable text for the current mode — do NOT restart
  document.getElementById('lang-wrap').innerHTML = langToggleHTML();
  if (currentMode === 'flip')  renderFlip();
  else if (currentMode === 'learn') renderLearnCard();
  else if (currentMode === 'tf') {
    const q = TRUEFALSE_QUESTIONS[tfOrder[tfIdx]];
    if (q) {
      document.getElementById('tf-statement').textContent = t(q.statement);
      const expEl = document.getElementById('tf-explanation');
      if (expEl.classList.contains('show')) expEl.textContent = t(q.explanation);
    }
  }
  else if (currentMode === 'write') {
    const card = WRITE_CARDS[writeOrder[writeIdx]];
    if (card) document.getElementById('write-prompt').textContent = t(card.prompt);
  }
  // match mode: MATCH_PAIRS are plain strings — no translation needed
}
document.getElementById('lang-wrap').innerHTML = langToggleHTML();


/* ================================================================
   FLIP MODE
   ================================================================ */
let flipIdx   = Store.get(KEYS.FC_IDX, 0);
let flipFlipped = false;
let flipSeen  = new Set(Store.get(KEYS.FC_SEEN, []));
if (flipIdx >= FLASHCARDS.length) flipIdx = 0;

function initFlip() {
  renderFlip();
  document.getElementById('lang-wrap').innerHTML = langToggleHTML();
}

function renderFlip() {
  const card = FLASHCARDS[flipIdx];
  document.getElementById('flip-q').textContent = t(card.q);
  document.getElementById('flip-a').textContent = t(card.a);
  document.getElementById('flip-count').textContent = `${flipIdx + 1} / ${FLASHCARDS.length}`;
  const fc = document.getElementById('flip-card');
  fc.classList.remove('flipped');
  flipFlipped = false;

  // Dots
  document.getElementById('flip-dots').innerHTML = FLASHCARDS.map((_, i) => {
    let cls = 'dot';
    if (i === flipIdx)      cls += ' active';
    else if (flipSeen.has(i)) cls += ' seen';
    return `<div class="${cls}" title="${i+1}"></div>`;
  }).join('');

  // Seen button
  const seenBtn = document.getElementById('btn-seen');
  seenBtn.textContent = flipSeen.has(flipIdx) ? '✓ נראה' : '✓ סמן כנראה';
  seenBtn.style.color = flipSeen.has(flipIdx) ? 'var(--success)' : '';

  // Stats
  const pct = Math.round(flipSeen.size / FLASHCARDS.length * 100);
  document.getElementById('flip-stats').innerHTML = `
    <div class="fc-stat"><strong>${flipSeen.size}/${FLASHCARDS.length}</strong>נראו</div>
    <div class="fc-stat"><strong>${pct}%</strong>השלמה</div>
    <div class="fc-stat"><strong>${FLASHCARDS.length - flipSeen.size}</strong>נותרו</div>
  `;

  Store.set(KEYS.FC_IDX, flipIdx);
}

function flipCard() {
  document.getElementById('flip-card').classList.toggle('flipped');
  flipFlipped = !flipFlipped;
}
function flipNext() { flipIdx = (flipIdx + 1) % FLASHCARDS.length; renderFlip(); }
function flipPrev() { flipIdx = (flipIdx - 1 + FLASHCARDS.length) % FLASHCARDS.length; renderFlip(); }
function markSeen() {
  if (flipSeen.has(flipIdx)) flipSeen.delete(flipIdx);
  else flipSeen.add(flipIdx);
  Store.set(KEYS.FC_SEEN, [...flipSeen]);
  renderFlip();
}
function resetSeen() {
  if (!confirm('לאפס את כל הכרטיסיות שראית?')) return;
  flipSeen = new Set();
  Store.set(KEYS.FC_SEEN, []);
  renderFlip();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (currentMode !== 'flip') return;
  if (e.key === 'ArrowRight') flipNext();
  if (e.key === 'ArrowLeft')  flipPrev();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// Touch / swipe on flip card
let touchX0 = 0, touchY0 = 0, isDrag = false, dragX0 = 0;
const flipOuter = document.getElementById('flip-outer');
flipOuter.addEventListener('touchstart', e => { touchX0 = e.touches[0].clientX; touchY0 = e.touches[0].clientY; }, {passive:true});
flipOuter.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX0;
  const dy = e.changedTouches[0].clientY - touchY0;
  if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    dx < 0 ? flipNext() : flipPrev();
  }
}, {passive:true});
flipOuter.addEventListener('mousedown', e => { isDrag = true; dragX0 = e.clientX; document.getElementById('flip-card').classList.add('dragging'); });
document.addEventListener('mouseup', e => {
  if (!isDrag) return;
  isDrag = false;
  const dx = e.clientX - dragX0;
  document.getElementById('flip-card').classList.remove('dragging');
  if (Math.abs(dx) > 60) { dx < 0 ? flipNext() : flipPrev(); }
});


/* ================================================================
   LEARN MODE
   ================================================================ */
let learnIdx   = 0;
let learnSide  = 'q'; // 'q' or 'a'
let learnOrder = [];
let learnGot   = new Set();
let learnReview = new Set();

function initLearn() {
  learnOrder = shuffle([...Array(FLASHCARDS.length).keys()]);
  learnIdx = 0;
  learnGot.clear();
  learnReview.clear();
  renderLearn();
}

function setLearnSide(side) {
  learnSide = side;
  document.getElementById('lside-q').classList.toggle('active', side === 'q');
  document.getElementById('lside-a').classList.toggle('active', side === 'a');
  renderLearnCard();
}

function renderLearn() {
  renderLearnCard();
  document.getElementById('learn-count').textContent = `${learnIdx + 1} / ${FLASHCARDS.length}`;
  document.getElementById('learn-answer-wrap').style.display = 'none';
  document.getElementById('learn-reveal-wrap').style.display = 'flex';
  const dot = FLASHCARDS.map((_, i) => {
    const qi = learnOrder[i] !== undefined ? learnOrder[i] : i;
    let cls = 'dot';
    if (i === learnIdx) cls += ' active';
    else if (learnGot.has(qi)) cls += ' seen';
    return `<div class="${cls}"></div>`;
  }).join('');
  document.getElementById('learn-dots').innerHTML = dot;
  document.getElementById('learn-stats').textContent =
    learnGot.size ? `${learnGot.size} ידעתי · ${learnReview.size} לחזור` : '';
}

function renderLearnCard() {
  const card = FLASHCARDS[learnOrder[learnIdx] || 0];
  document.getElementById('learn-card').textContent = learnSide === 'q' ? t(card.q) : t(card.a);
  document.getElementById('learn-answer-card').textContent = learnSide === 'q' ? t(card.a) : t(card.q);
}

function learnReveal() {
  document.getElementById('learn-reveal-wrap').style.display = 'none';
  document.getElementById('learn-answer-wrap').style.display = 'block';
}
function learnGotIt() {
  learnGot.add(learnOrder[learnIdx]);
  learnReview.delete(learnOrder[learnIdx]);
  learnNext();
}
function learnAgain() {
  learnReview.add(learnOrder[learnIdx]);
  learnNext();
}
function learnNext() {
  if (learnIdx < FLASHCARDS.length - 1) { learnIdx++; renderLearn(); }
  else {
    document.getElementById('learn-stats').textContent =
      `סיים! ${learnGot.size}/${FLASHCARDS.length} ידעתי`;
  }
}
function learnPrev() {
  if (learnIdx > 0) { learnIdx--; renderLearn(); }
}


/* ================================================================
   MATCH MODE
   ================================================================ */
let matchTiles    = [];
let matchSelected = -1;
let matchMatched  = new Set();
let matchWrong    = new Set();
let matchLocked   = false;
let matchTimerInt = null;
let matchSeconds  = 0;

function startMatch() {
  const pairs = shuffle([...MATCH_PAIRS]).slice(0, 6);
  matchTiles = shuffle([
    ...pairs.map((p, i) => ({ pairIdx: i, text: p.term, isTerm: true })),
    ...pairs.map((p, i) => ({ pairIdx: i, text: p.def,  isTerm: false }))
  ]);
  matchSelected = -1;
  matchMatched  = new Set();
  matchWrong    = new Set();
  matchLocked   = false;
  matchSeconds  = 0;
  clearInterval(matchTimerInt);
  matchTimerInt = null;
  document.getElementById('match-done').style.display = 'none';
  document.getElementById('match-timer').textContent = '0:00';
  const best = Store.get(KEYS.MATCH_BEST, 0);
  document.getElementById('match-best').textContent = best ? `שיא: ${fmtTime(best)}` : '';
  renderMatchGrid();
}

function renderMatchGrid() {
  document.getElementById('match-progress').textContent = `${matchMatched.size}/6 זוגות`;
  document.getElementById('match-grid').innerHTML = matchTiles.map((tile, i) => {
    let cls = 'match-tile';
    if (tile.isTerm) cls += ' term';
    if (matchMatched.has(tile.pairIdx)) cls += ' matched';
    else if (matchWrong.has(i)) cls += ' wrong';
    else if (matchSelected === i) cls += ' selected';
    return `<div class="${cls}" onclick="clickMatch(${i})">${esc(tile.text)}</div>`;
  }).join('');

  if (matchMatched.size === 6) {
    clearInterval(matchTimerInt);
    matchTimerInt = null;
    const best = Store.get(KEYS.MATCH_BEST, 0);
    if (!best || matchSeconds < best) {
      Store.set(KEYS.MATCH_BEST, matchSeconds);
      document.getElementById('match-done-time').textContent = `זמן: ${fmtTime(matchSeconds)} ⭐ שיא חדש!`;
    } else {
      document.getElementById('match-done-time').textContent = `זמן: ${fmtTime(matchSeconds)} · שיא: ${fmtTime(best)}`;
    }
    document.getElementById('match-done').style.display = 'block';
  }
}

function clickMatch(i) {
  if (matchLocked) return;
  if (matchMatched.has(matchTiles[i].pairIdx)) return;

  // Start timer on first click
  if (!matchTimerInt && matchMatched.size === 0 && matchSelected === -1) {
    matchTimerInt = setInterval(() => {
      matchSeconds++;
      document.getElementById('match-timer').textContent = fmtTime(matchSeconds);
    }, 1000);
  }

  matchWrong.clear();

  if (matchSelected === i) { matchSelected = -1; renderMatchGrid(); return; }

  if (matchSelected === -1) { matchSelected = i; renderMatchGrid(); return; }

  const a = matchTiles[matchSelected];
  const b = matchTiles[i];
  const prevSel = matchSelected;
  matchSelected = -1;

  if (a.pairIdx === b.pairIdx) {
    matchMatched.add(a.pairIdx);
    renderMatchGrid();
  } else {
    matchLocked = true;
    matchWrong = new Set([prevSel, i]);
    renderMatchGrid();
    setTimeout(() => { matchLocked = false; matchWrong.clear(); renderMatchGrid(); }, 650);
  }
}


/* ================================================================
   TRUE / FALSE MODE
   ================================================================ */
let tfOrder  = [];
let tfIdx    = 0;
let tfScore  = 0;
let tfAnswered = false;

function startTF() {
  tfOrder    = shuffle([...Array(TRUEFALSE_QUESTIONS.length).keys()]);
  tfIdx      = 0;
  tfScore    = 0;
  tfAnswered = false;
  document.getElementById('tf-done').style.display = 'none';
  renderTF();
}

function renderTF() {
  const q = TRUEFALSE_QUESTIONS[tfOrder[tfIdx]];
  document.getElementById('tf-statement').textContent = t(q.statement);
  document.getElementById('tf-count').textContent = `${tfIdx + 1} / ${TRUEFALSE_QUESTIONS.length}`;
  document.getElementById('tf-score').textContent = `${tfScore} נכון`;
  const pct = Math.round(tfIdx / TRUEFALSE_QUESTIONS.length * 100);
  document.getElementById('tf-prog').style.width = pct + '%';
  document.getElementById('tf-prog').style.background = pctColor(pct);

  // Reset state
  tfAnswered = false;
  const trueBtn  = document.getElementById('tf-true-btn');
  const falseBtn = document.getElementById('tf-false-btn');
  trueBtn.className  = 'tf-true';
  falseBtn.className = 'tf-false';
  trueBtn.disabled   = false;
  falseBtn.disabled  = false;
  document.getElementById('tf-explanation').className = 'tf-explanation';
  document.getElementById('tf-next').style.display = 'none';
}

function answerTF(answer) {
  if (tfAnswered) return;
  tfAnswered = true;
  const q = TRUEFALSE_QUESTIONS[tfOrder[tfIdx]];
  const correct = answer === q.correct;
  if (correct) tfScore++;

  const trueBtn  = document.getElementById('tf-true-btn');
  const falseBtn = document.getElementById('tf-false-btn');
  trueBtn.disabled  = true;
  falseBtn.disabled = true;

  if (answer === true)  { trueBtn.className  = correct ? 'tf-true correct'  : 'tf-true wrong';  }
  else                  { falseBtn.className = correct ? 'tf-false correct' : 'tf-false wrong'; }

  // Mark the correct answer
  if (!correct) {
    if (q.correct === true)  trueBtn.className  = 'tf-true correct';
    else                     falseBtn.className = 'tf-false correct';
  }

  const expEl = document.getElementById('tf-explanation');
  expEl.textContent = t(q.explanation);
  expEl.className   = 'tf-explanation show';

  document.getElementById('tf-next').style.display = 'inline-block';
}

function nextTF() {
  tfIdx++;
  if (tfIdx >= TRUEFALSE_QUESTIONS.length) {
    finishTF();
    return;
  }
  renderTF();
}

function finishTF() {
  const pct = Math.round(tfScore / TRUEFALSE_QUESTIONS.length * 100);
  const history = Store.get(KEYS.TF_HISTORY, []);
  history.push({ date: todayStr(), score: tfScore, total: TRUEFALSE_QUESTIONS.length });
  if (history.length > 10) history.shift();
  Store.set(KEYS.TF_HISTORY, history);

  document.getElementById('tf-done').style.display = 'block';
  document.getElementById('tf-done-icon').textContent  = pct >= 80 ? '🎉' : pct >= 55 ? '👍' : '📚';
  document.getElementById('tf-done-title').textContent = pct >= 80 ? 'מצוין!' : pct >= 55 ? 'לא רע!' : 'צריך לחזור על החומר';
  document.getElementById('tf-done-sub').textContent   = `${tfScore}/${TRUEFALSE_QUESTIONS.length} נכון (${pct}%)`;
}


/* ================================================================
   WRITE MODE
   ================================================================ */
let writeOrder   = [];
let writeIdx     = 0;
let writeScore   = 0;
let writeAnswered = false;

function startWrite() {
  writeOrder    = shuffle([...Array(WRITE_CARDS.length).keys()]);
  writeIdx      = 0;
  writeScore    = 0;
  writeAnswered = false;
  document.getElementById('write-done').style.display = 'none';
  renderWrite();
}

function renderWrite() {
  const card = WRITE_CARDS[writeOrder[writeIdx]];
  document.getElementById('write-prompt').textContent = t(card.prompt);
  document.getElementById('write-count').textContent  = `${writeIdx + 1} / ${WRITE_CARDS.length}`;
  document.getElementById('write-score').textContent  = `${writeScore} נכון`;
  const pct = Math.round(writeIdx / WRITE_CARDS.length * 100);
  document.getElementById('write-prog').style.width   = pct + '%';
  document.getElementById('write-prog').style.background = pctColor(pct);

  writeAnswered = false;
  const input = document.getElementById('write-input');
  input.value     = '';
  input.className = 'write-input';
  input.disabled  = false;
  input.focus();
  document.getElementById('write-feedback').className = 'write-feedback';
  document.getElementById('write-next').style.display = 'none';
}

function submitWrite() {
  if (writeAnswered) return;
  const input = document.getElementById('write-input');
  const card  = WRITE_CARDS[writeOrder[writeIdx]];
  const ok    = checkWriteAnswer(input.value, card.answer);
  writeAnswered = true;
  writeScore += ok ? 1 : 0;

  input.className = 'write-input ' + (ok ? 'correct' : 'wrong');
  input.disabled  = true;

  const fb = document.getElementById('write-feedback');
  fb.textContent = ok ? `✅ נכון! "${card.answer}"` : `❌ תשובה נכונה: "${card.answer}"`;
  fb.className   = 'write-feedback ' + (ok ? 'correct' : 'wrong');

  document.getElementById('write-next').style.display = 'inline-block';
}

function nextWrite() {
  writeIdx++;
  if (writeIdx >= WRITE_CARDS.length) {
    finishWrite();
    return;
  }
  renderWrite();
}

function finishWrite() {
  const pct = Math.round(writeScore / WRITE_CARDS.length * 100);
  const history = Store.get(KEYS.WRITE_HISTORY, []);
  history.push({ date: todayStr(), score: writeScore, total: WRITE_CARDS.length });
  if (history.length > 10) history.shift();
  Store.set(KEYS.WRITE_HISTORY, history);

  document.getElementById('write-done').style.display = 'block';
  document.getElementById('write-done-icon').textContent  = pct >= 80 ? '🎉' : pct >= 55 ? '👍' : '📚';
  document.getElementById('write-done-title').textContent = pct >= 80 ? 'מצוין!' : pct >= 55 ? 'ממשיכים!' : 'עוד קצת תרגול';
  document.getElementById('write-done-sub').textContent   = `${writeScore}/${WRITE_CARDS.length} נכון (${pct}%)`;
}

/* ================================================================
   INIT — restore saved mode
   ================================================================ */
(function init() {
  const tabs = document.querySelectorAll('.mode-tab');
  const modes = ['flip','learn','match','tf','write'];
  tabs.forEach((btn, i) => {
    if (modes[i] === currentMode) btn.classList.add('active');
    else btn.classList.remove('active');
  });
  setMode(currentMode, document.querySelector(`.mode-tab.active`));
})();
</script>
</body>
</html>
