<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MineMaster – חידון | Study Hub</title>
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="css/style.css">
<script src="../shared/navbar.js" defer></script>
<script src="../shared/utils.js"></script>
</head>
<body>

<div class="page-header">
  <div class="page-header-inner">
    <span class="page-eyebrow">MineMaster · חידון</span>
    <h1 class="page-title">חידון</h1>
    <p class="page-subtitle">10 שאלות · תרגול חופשי · אין לחץ זמן</p>
  </div>
</div>
<main class="page-main">

  <!-- SCORE BAR -->
  <div class="score-screen" style="display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--radius-md);margin-bottom:18px;text-align:right">
    <div>
      <div style="font-size:1.9rem;font-weight:900;color:var(--accent)" id="qs">0</div>
      <div style="font-size:.75rem;color:var(--muted)">נכון</div>
    </div>
    <div style="flex:1">
      <div style="font-size:.85rem;font-weight:600">ציון: <span id="qp">—</span></div>
      <div style="font-size:.73rem;color:var(--muted)" id="qpr">ענה שאלה ראשונה</div>
    </div>
    <div>
      <button class="btn-primary" onclick="resetQ()" style="font-size:.78rem;padding:6px 12px">🔄 אפס</button>
    </div>
  </div>

  <!-- QUIZ HISTORY -->
  <div id="quiz-history-bar" style="margin-bottom:14px;display:none">
    <div class="card card-glass" style="padding:12px 16px">
      <div class="card-title" style="margin-bottom:8px;font-size:.82rem">📊 ניסיונות קודמים</div>
      <div id="quiz-history-list" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
  </div>

  <!-- QUESTIONS -->
  <div id="qc"></div>

  <!-- FINISHED BANNER -->
  <div id="quiz-done" style="display:none">
    <div class="score-screen show">
      <div style="font-size:2.5rem;margin-bottom:10px" id="done-emoji"></div>
      <div class="score-big" id="done-title"></div>
      <div class="score-msg" id="done-sub"></div>
      <button class="btn-primary" onclick="resetQ()">🔄 נסה שוב</button>
      <a href="exam.html" class="btn-primary" style="margin-right:8px;background:var(--surface);color:var(--text);border:1px solid var(--border)">🎓 מבחן בגרות</a>
    </div>
  </div>

</main>

<script src="js/data.js"></script>
<script>
  let qScore = 0, qAns = 0;

  function renderQ() {
    document.getElementById('qc').innerHTML = QUIZ_QUESTIONS.map((q, qi) => `
      <div class="q-card" id="qq${qi}">
        <div class="q-num">שאלה ${qi + 1} מתוך ${QUIZ_QUESTIONS.length}</div>
        <div class="q-text">${esc(q.q)}</div>
        <div class="q-opts">
          ${q.o.map((o, oi) =>
            `<div class="q-opt" id="qo${qi}${oi}" onclick="ansQ(${qi},${oi})">${esc(o)}</div>`
          ).join('')}
        </div>
        <div class="q-feedback" id="qe${qi}">💡 ${esc(q.e)}</div>
      </div>
    `).join('');

    const saved = Store.get(KEYS.QUIZ_ANSWERS, {});
    Object.entries(saved).forEach(([qi, oi]) => {
      applyAnswer(parseInt(qi), parseInt(oi), false);
    });

    renderHistory();
  }

  function applyAnswer(qi, oi, save = true) {
    const q = QUIZ_QUESTIONS[qi];
    for (let i = 0; i < q.o.length; i++) {
      const b = document.getElementById(`qo${qi}${i}`);
      if (!b) continue;
      b.classList.add('locked');
      if (i === q.c)                   b.classList.add('correct');
      else if (i === oi && oi !== q.c) b.classList.add('wrong');
    }
    const explain = document.getElementById(`qe${qi}`);
    if (explain) explain.classList.add('show');
    if (save) {
      Store.update(KEYS.QUIZ_ANSWERS, ans => ({ ...ans, [qi]: oi }), {});
    }
  }

  function ansQ(qi, oi) {
    const b0 = document.getElementById(`qo${qi}0`);
    if (b0 && b0.classList.contains('locked')) return;
    qAns++;
    if (oi === QUIZ_QUESTIONS[qi].c) qScore++;
    applyAnswer(qi, oi);
    updateScore();
    if (qAns === QUIZ_QUESTIONS.length) finishQuiz();
  }

  function updateScore() {
    document.getElementById('qs').textContent  = qScore;
    document.getElementById('qp').textContent  = qAns ? Math.round(qScore / qAns * 100) + '%' : '—';
    document.getElementById('qpr').textContent = `${qAns} מתוך ${QUIZ_QUESTIONS.length} שאלות`;
  }

  function finishQuiz() {
    const pct     = Math.round(qScore / QUIZ_QUESTIONS.length * 100);
    const history = Store.get(KEYS.QUIZ_HISTORY, []);
    history.push({ date: todayStr(), score: qScore, total: QUIZ_QUESTIONS.length });
    if (history.length > 10) history.shift();
    Store.set(KEYS.QUIZ_HISTORY, history);
    Store.set(KEYS.QUIZ_ANSWERS, {});

    const banner = document.getElementById('quiz-done');
    banner.style.display = 'block';
    document.getElementById('done-emoji').textContent  = pct >= 80 ? '🎉' : pct >= 55 ? '👍' : '📚';
    document.getElementById('done-title').textContent  = `${qScore}/${QUIZ_QUESTIONS.length}`;
    document.getElementById('done-sub').textContent    = pct >= 80 ? 'מעולה! מוכן לבגרות' : pct >= 55 ? 'טוב, כדאי לחזור על מה שטעית' : `${pct}% — לחזור על החומר שוב`;
    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
    renderHistory();
  }

  function resetQ() {
    qScore = 0; qAns = 0;
    Store.set(KEYS.QUIZ_ANSWERS, {});
    document.getElementById('qs').textContent  = 0;
    document.getElementById('qp').textContent  = '—';
    document.getElementById('qpr').textContent = 'ענה שאלה ראשונה';
    document.getElementById('quiz-done').style.display = 'none';
    renderQ();
  }

  function renderHistory() {
    const history = Store.get(KEYS.QUIZ_HISTORY, []);
    const bar  = document.getElementById('quiz-history-bar');
    const list = document.getElementById('quiz-history-list');
    if (!history.length) { bar.style.display = 'none'; return; }
    bar.style.display = 'block';
    list.innerHTML = history.slice().reverse().map(h => {
      const pct   = Math.round(h.score / h.total * 100);
      const color = pctColor(pct);
      return `<span class="tag" style="background:rgba(79,142,247,.1);border:1px solid var(--border);color:${color};font-size:.73rem">
        ${h.date}: ${h.score}/${h.total} (${pct}%)
      </span>`;
    }).join('');
  }

  renderQ();

  // Quiz questions are Hebrew-only strings — lang toggle saves preference for other pages
  function onLangChange() {}  // no-op: QUIZ_QUESTIONS has no multilang structure
</script>
</body>
</html>
