<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MineMaster – סקירה | Study Hub</title>
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="css/style.css">
<script src="../shared/navbar.js" defer></script>
<script src="../shared/utils.js"></script>
</head>
<body>

<div class="page-header">
  <div class="page-header-inner">
    <span class="page-eyebrow">MineMaster · Android</span>
    <h1 class="page-title">MineMaster</h1>
    <p class="page-subtitle">סקירת הפרויקט — Java · Android · Algorithms</p>
  </div>
</div>
<main class="page-main">

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="חפש נושא, מחלקה, מושג..." autocomplete="off">
    <button class="search-clear" id="search-clear">✕</button>
  </div>
  <div class="search-results" id="search-results"></div>

  <!-- containers — filled by JS below -->
  <div class="card card-glass" id="layers-card"></div>
  <div class="card card-glass" id="advanced-card"></div>
  <div class="card card-glass" id="stats-card"></div>

  <!-- APP PREVIEW -->
  <div class="card card-glass">
    <div class="card-title">📱 תצוגת האפליקציה</div>
    <div class="app-preview-row">
      <div>
        <div class="phone-mockup">
          <img src="images/page31_img2.jpeg" alt="App screenshot">
        </div>
        <div class="app-preview-label">מסך משחק</div>
      </div>
      <div>
        <div class="phone-mockup">
          <img src="images/page32_img1.png" alt="App screenshot">
        </div>
        <div class="app-preview-label">GameEngine</div>
      </div>
      <div>
        <div class="phone-mockup">
          <img src="images/page33_img1.png" alt="App screenshot">
        </div>
        <div class="app-preview-label">Firebase Sync</div>
      </div>
      <div>
        <div class="phone-mockup" style="width:160px;border-radius:24px">
          <img src="images/page37_img1.png" alt="App screenshot">
        </div>
        <div class="app-preview-label">תצוגה נוספת</div>
      </div>
    </div>
  </div>

  <div class="card card-glass" id="rubric-card"></div>
  <div class="card card-glass" id="aes-card"></div>
  <div class="card card-glass" id="links-card"></div>

  <div class="card card-glass" id="progress-card">
    <div class="card-title">📈 התקדמות שלך</div>
    <div id="progress-summary">
      <p style="color:var(--muted);font-size:.84rem">עדיין אין נתוני התקדמות — התחל עם כרטיסיות!</p>
    </div>
  </div>

</main>

<script src="js/data.js"></script>
<script src="js/search.js"></script>
<script>
'use strict';

/* ---- LEARNING LAYERS ---- */
const LAYERS = [
  { cls: '',       icon: '📡', title: 'שירותי רשת',      desc: 'INetworkService, FirebaseManager, CRUD, הצפנה AES, העלאת תמונות' },
  { cls: 'orange', icon: '🗄️', title: 'מסד נתונים',      desc: 'DSD, 5 טבלאות, טבלת קישור, Room v6, Migrations 1→6' },
  { cls: 'green',  icon: '🏗️', title: 'OOP + ארכיטקטורה', desc: 'MVVM, GameEngine (Pure Java), VMFactory, BaseFirebaseModel, Repository' },
  { cls: 'purple', icon: '🧠', title: 'ViewModel + Async', desc: 'LiveData, setValue/postValue, WorkManager, Timer, onCleared()' },
];

document.getElementById('layers-card').innerHTML = `
  <div class="card-title">🎯 מבנה הלימוד – 4 שכבות לבגרות</div>
  <div class="overview-grid">
    ${LAYERS.map(l => `
      <div class="highlight ${l.cls}">
        ${l.icon} <strong>${l.title}</strong>
        <br><span style="font-size:.78rem;color:var(--muted)">${l.desc}</span>
      </div>`).join('')}
  </div>`;

/* ---- ADVANCED TOPICS ---- */
const ADV_TOPICS = [
  'NFC – שיתוף אתגרים (NDEF)',
  'Custom View — GameBoardView (Canvas)',
  'Multiplayer — Firebase RTDB rooms/',
  'WorkManager — Offline First Sync',
  'Firebase Remote DB — CRUD מלא',
  'Daily Challenge — seed deterministic',
  'AES Encryption',
  'Image Upload — Firebase Storage + Glide',
];

document.getElementById('advanced-card').innerHTML = `
  <div class="card-title">✅ נושאים מתקדמים (סעיף 9)</div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
    ${ADV_TOPICS.map(t => `<span class="tag tg">✅ ${t}</span>`).join('')}
  </div>
  <div class="highlight orange">
    <strong>⚠️ לבגרות:</strong> Firebase Remote DB נחשב גם לנושא מתקדם וגם לחובת DB — ניקוד כפול!
  </div>`;

/* ---- PROJECT STATS (counts from data.js) ---- */
document.getElementById('stats-card').innerHTML = `
  <div class="card-title">📊 סטטיסטיקות הפרויקט</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;text-align:center">
    <div class="fc-stat"><strong>${CLASSES.length}+</strong>מחלקות Java</div>
    <div class="fc-stat"><strong>${XML_LAYOUTS.length}</strong>layout XMLs</div>
    <div class="fc-stat"><strong>5</strong>טבלאות Room</div>
    <div class="fc-stat"><strong>${DESIGN_DECISIONS.length}</strong>החלטות עיצוב</div>
    <div class="fc-stat"><strong>${FLASHCARDS.length}</strong>כרטיסיות</div>
    <div class="fc-stat"><strong>${EXAM_QUESTIONS.length}</strong>שאלות בנק</div>
  </div>`;

/* ---- BAGRUT RUBRIC ---- */
const RUBRIC = [
  { what: 'מבוא + מטרות + ממשק',            weight: '10%',   where: 'פרק 1 בתיק + מסכים' },
  { what: 'מדריך משתמש + דיאגרמת מסכים',    weight: '10%',   where: 'NavigationHelper + BaseNavigationActivity' },
  { what: 'ארכיטקטורה + UML + עצי מחלקות',  weight: '15%',   where: 'MVVM, GameEngine, VMFactory, BaseFirebaseModel' },
  { what: 'מסד נתונים – DSD + טבלאות',      weight: '10%',   where: 'AppDatabase v6, 5 entities, migrations' },
  { what: 'מימוש – קוד + OOP + הפרדה',      weight: '25%',   where: 'GameEngine ≠ ViewModel ≠ View (Clean Arch)' },
  { what: 'שירותי רשת – Interface + CRUD',   weight: 'חלופה', where: 'INetworkService + FirebaseManager (implements)' },
  { what: 'הרחבות (Async, תמונות, הצפנה)',  weight: 'בונוס', where: 'WorkManager, Storage+Glide, EncryptionUtil/AES' },
];

document.getElementById('rubric-card').innerHTML = `
  <div class="card-title">📋 מחוון הבגרות</div>
  <table class="cmp-table">
    <tr><th>מה נבדק</th><th>משקל</th><th>איפה בפרויקט</th></tr>
    ${RUBRIC.map(r => `<tr><td>${r.what}</td><td>${r.weight}</td><td>${r.where}</td></tr>`).join('')}
  </table>`;

/* ---- AES CODE EXAMPLE ---- */
document.getElementById('aes-card').innerHTML = `
  <div class="card-title">🔐 AES Encryption — קוד לדוגמה</div>
  <div class="code-block">
    <div class="code-block-header">
      <span class="code-lang-badge">Java</span>
      <button class="copy-btn" onclick="copyCode(this)">העתק</button>
    </div>
    <pre><span class="kw">public static</span> <span class="cn">String</span> <span class="fn">encrypt</span>(<span class="cn">String</span> data, <span class="cn">String</span> key) <span class="kw">throws</span> <span class="cn">Exception</span> {
    <span class="cn">SecretKeySpec</span> secretKey = <span class="kw">new</span> <span class="cn">SecretKeySpec</span>(key.<span class="fn">getBytes</span>(), <span class="st">"AES"</span>);
    <span class="cn">Cipher</span> cipher = <span class="cn">Cipher</span>.<span class="fn">getInstance</span>(<span class="st">"AES"</span>);
    cipher.<span class="fn">init</span>(<span class="cn">Cipher</span>.<span class="nm">ENCRYPT_MODE</span>, secretKey);
    <span class="kw">return</span> <span class="cn">Base64</span>.<span class="fn">encodeToString</span>(cipher.<span class="fn">doFinal</span>(data.<span class="fn">getBytes</span>()), <span class="cn">Base64</span>.<span class="nm">DEFAULT</span>);
}</pre>
  </div>
  <div class="highlight green" style="margin-top:6px">
    AES = סימטרי (אותו key להצפנה ולפענוח). Base64 ממיר bytes → String לשמירה ב-Firestore.
  </div>`;

/* ---- QUICK LINKS ---- */
const LINKS = [
  { href: 'architecture.html', label: '🏗️ ארכיטקטורה', cls: 'btn-secondary' },
  { href: 'code.html',         label: '💻 קוד',          cls: 'btn-secondary' },
  { href: 'topics.html',       label: '📚 נושאים',       cls: 'btn-secondary' },
  { href: 'flashcards.html',   label: '🃏 כרטיסיות',     cls: 'btn-secondary' },
  { href: 'quiz.html',         label: '✏️ חידון',         cls: 'btn-secondary' },
  { href: 'exam.html',         label: '🎓 מבחן',          cls: 'btn-primary'   },
];

document.getElementById('links-card').innerHTML = `
  <div class="card-title">🚀 קפיצה מהירה</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">
    ${LINKS.map(l =>
      `<a href="${l.href}" class="btn ${l.cls}" style="justify-content:center;text-decoration:none">${l.label}</a>`
    ).join('')}
  </div>`;

/* ---- PROGRESS SUMMARY ---- */
(function () {
  const seen    = Store.get(KEYS.FC_SEEN, []);
  const history = Store.get(KEYS.QUIZ_HISTORY, []);
  const exams   = Store.get(KEYS.EXAM_HISTORY, []);
  const tf      = Store.get(KEYS.TF_HISTORY, []);
  const write   = Store.get(KEYS.WRITE_HISTORY, []);

  if (!seen.length && !history.length && !exams.length && !tf.length && !write.length) return;

  let html = '';

  if (seen.length) {
    const pct = Math.round(seen.length / FLASHCARDS.length * 100);
    html += `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:4px">
        <span>🃏 כרטיסיות</span>
        <span style="color:var(--accent)">${seen.length}/${FLASHCARDS.length} (${pct}%)</span>
      </div>
      ${progressBarHTML(pct)}
    </div>`;
  }

  const renderBest = (arr, label, icon) => {
    if (!arr.length) return '';
    const best = arr.reduce((a, b) => (a.score / a.total > b.score / b.total ? a : b));
    const pct  = Math.round(best.score / best.total * 100);
    return `<div style="font-size:.82rem;margin-bottom:5px">
      ${icon} ${label}: <strong style="color:${pctColor(pct)}">${best.score}/${best.total} (${pct}%)</strong>
    </div>`;
  };

  html += renderBest(history, 'חידון הכי טוב',     '✏️');
  html += renderBest(tf,      'נכון/שגוי הכי טוב', '✔️');
  html += renderBest(write,   'כתיבה הכי טוב',     '✍️');

  if (exams.length) {
    const best = exams.reduce((a, b) => a.grade > b.grade ? a : b);
    const pass = best.grade >= 55;
    html += `<div style="font-size:.82rem">🎓 מבחן: <strong style="color:${pass ? 'var(--success)' : 'var(--danger)'}">${best.grade}</strong></div>`;
  }

  if (html) document.getElementById('progress-summary').innerHTML = html;
})();
</script>
</body>
</html>
