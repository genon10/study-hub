<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRC Robot – בקרוב | Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/style.css">
<link rel="stylesheet" href="../minesweeper/css/style.css">
</head>
<body>

<nav class="top-nav">
  <div class="top-nav-inner">
    <a href="../index.html" class="nav-back">🏠 Hub</a>
  </div>
</nav>

<div class="page-wrap" style="display:flex;align-items:center;justify-content:center;min-height:70vh">
  <div style="text-align:center">
    <div style="font-size:4rem;margin-bottom:16px;animation:float 4s ease-in-out infinite">🤖</div>
    <h1 style="font-size:2rem;font-weight:900;background:linear-gradient(130deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">FRC Robot Project</h1>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:24px">Java · WPILib · PID · Computer Vision</p>
    <div class="highlight" style="max-width:400px;margin:0 auto 24px;text-align:right">
      <strong>בקרוב:</strong> תוכן לימוד לפרויקט הרובוט יתווסף כאן ברגע שיהיה מוכן.
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px">
      <span class="tag" style="opacity:.5">WPILib</span>
      <span class="tag" style="opacity:.5">PID Control</span>
      <span class="tag" style="opacity:.5">Command-Based</span>
      <span class="tag" style="opacity:.5">Computer Vision</span>
      <span class="tag" style="opacity:.5">CAN Bus</span>
      <span class="tag" style="opacity:.5">Subsystems</span>
    </div>
    <a href="../index.html" class="btn btn-secondary" style="text-decoration:none">← חזור ל-Hub</a>

    <div id="frc-progress" style="display:none;margin-top:28px;padding:20px 24px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px">
      <div style="font-size:.75rem;font-weight:600;color:var(--muted);letter-spacing:.05em;margin-bottom:16px;text-align:center">📈 התקדמות שלך</div>
      <div style="display:flex;gap:40px;justify-content:center;align-items:center" id="frc-rings"></div>
    </div>
  </div>
</div>

<script>
(function () {
  function makeRing(pct, label, color) {
    var r    = 22;
    var circ = +(2 * Math.PI * r).toFixed(2);
    var off  = +((1 - pct / 100) * circ).toFixed(2);
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:8px">'
      + '<div class="progress-ring-wrap" style="width:56px;height:56px" title="' + pct + '% ' + label + '">'
      + '<svg class="progress-ring" width="54" height="54" viewBox="0 0 54 54">'
      + '<circle class="progress-ring-track" cx="27" cy="27" r="' + r + '"/>'
      + '<circle class="progress-ring-fill"  cx="27" cy="27" r="' + r + '"'
      + ' stroke-dasharray="' + circ + '" stroke-dashoffset="' + off + '"'
      + ' style="stroke:' + color + '"/>'
      + '</svg>'
      + '<span class="progress-ring-label" style="font-size:.62rem;color:' + color + '">' + pct + '%</span>'
      + '</div>'
      + '<span style="font-size:.72rem;color:var(--muted)">' + label + '</span>'
      + '</div>';
  }

  var fcRaw = JSON.parse(localStorage.getItem('frc_flashcards_seen') || 'null');
  var qzRaw = JSON.parse(localStorage.getItem('frc_quiz_score')      || 'null');

  if (fcRaw === null && qzRaw === null) return;

  var fcPct = 0, qzPct = 0, hasFC = false, hasQZ = false;

  if (Array.isArray(fcRaw) && fcRaw.length) {
    fcPct = Math.min(100, Math.round(fcRaw.length / 35 * 100));
    hasFC = true;
  } else if (typeof fcRaw === 'number') {
    fcPct = Math.min(100, Math.round(fcRaw));
    hasFC = true;
  }

  if (qzRaw !== null && typeof qzRaw === 'object' && qzRaw.total) {
    qzPct = Math.min(100, Math.round(qzRaw.score / qzRaw.total * 100));
    hasQZ = true;
  } else if (typeof qzRaw === 'number') {
    qzPct = Math.min(100, Math.round(qzRaw));
    hasQZ = true;
  }

  var html = '';
  if (hasFC) html += makeRing(fcPct, 'כרטיסיות', '#22c55e');
  if (hasQZ) html += makeRing(qzPct, 'חידון',    '#a78bfa');

  if (!html) return;
  document.getElementById('frc-rings').innerHTML = html;
  document.getElementById('frc-progress').style.display = '';
})();
</script>

</body>
</html>
